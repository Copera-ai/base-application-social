name: Deploy App

on:
  workflow_call:
    inputs:
      APP_NAME:
        type: string
        required: true
      APP_DOCKER_FILE:
        type: string
        required: true
      SERVICES:
        type: string
        required: true
      REPOSITORY_OWNER:
        type: string
        required: true
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      DEPLOY_PATH:
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.APP_DOCKER_FILE }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ inputs.REPOSITORY_OWNER }}/base-app-${{ inputs.APP_NAME }}:latest
            ghcr.io/${{ inputs.REPOSITORY_OWNER }}/base-app-${{ inputs.APP_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ inputs.APP_NAME }}
          cache-to: type=gha,mode=max,scope=${{ inputs.APP_NAME }}
          provenance: false

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            docker compose pull ${{ inputs.SERVICES }}
            docker compose up -d --no-deps ${{ inputs.SERVICES }}
            docker image prune -f

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 15
            for svc in ${{ inputs.SERVICES }}; do
              status=$(docker inspect --format='{{.State.Status}}' base-app-${svc} 2>/dev/null || echo "not found")
              echo "Container base-app-${svc}: ${status}"
              if [ "$status" != "running" ]; then
                echo "ERROR: base-app-${svc} is not running!"
                docker logs --tail 50 base-app-${svc} 2>/dev/null || true
                exit 1
              fi
            done
